  steps:
    - title: "회원가입 & 프로필 설정"
      description: "간편 가입 후 체형 정보를 입력하면 AI가 목표 체형을 시뮬레이션합니다"
    - title: "배틀 선택 & 참가"
      description: "시즌별, 테마별, 게임형 등 다양한 배틀 중 원하는 것을 골라 참가하세요!"
    - title: "매일 미션 수행"
      description: "걷기, AI 식단, 운동, 체중 인증 등 일일 미션을 완료하고 XP와 뱃지를 획득하세요"
    - title: "랭킹 & 상금 획득"
      description: "목표 달성 시 참가비 풀을 배분받고, 1등은 총 상금의 78%를 가져갑니다!"

# ===== 보상 시스템 =====
rewards:
  label: "보상 시스템"
  title: "노력하면 진짜 보상이 돌아옵니다"
  description: "XP 적립, 뱃지, 기프티콘, 상금까지 — 매일이 보람찬 다이어트"
  cards:
    - title: "배틀 상금"
      description: "참가비 × 참가자 수 = 총 상금! 1등은 총 상금의 78%를 가져갑니다. 내가 1등이면 수백만원!"
    - title: "XP 포인트 적립"
      description: "매일 체중 인증(100XP), 식단 기록(150XP), 운동 기록(200XP)으로 월 20만원 수익 기회!"
    - title: "기프티콘 & 쿠폰"
      description: "스타벅스, GS25, 맥도날드, 메가박스, 배달의민족 등 XP로 실질적인 혜택을 누리세요"
    - title: "레벨업 & 뱃지"
      description: "레벨 1(첫 1주 완주)부터 레벨 10(8주 챌린지 우승)까지, 성장의 쾌감을 느끼세요"
    - title: "의류 리세일"
      description: "감량 후 큰 옷을 포인트로 매입! 새 사이즈 의류 할인까지. 옷장도 새로워집니다"

